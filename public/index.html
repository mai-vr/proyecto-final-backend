<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <section class="register-form">
        <form class="register">
            <label for="username">Username</label>
            <input type="text" name="username" id="username" placeholder="Type your username here...">
            <label for="email">Email</label>
            <input type="email" name="email" id="email" placeholder="Type your email here...">
            <label for="password">Password</label>
            <input type="password" name="password" id="password" placeholder="Type your password here...">
            <label for="degree">Degree (optional)</label>
            <input type="text" name="degree" id="degree" placeholder="Type your degree here...">
            <label for="biography">Biography (optional)</label>
            <textarea name="biography" id="biography">Talk about you here...</textarea>
            <button>
                Submit
            </button>
        </form>
        <div class="app-content"></div>
    </section>
</body>
<script src="./js/script.js"></script>

</html>
